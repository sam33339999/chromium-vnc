services:
  chromium-vnc:
    build: .
    container_name: chromium-vnc
    ports:
      - "5901:5901"   # VNC
      - "9222:9222"   # Chrome DevTools Protocol (CDP) - internal
      - "9223:9223"   # Chrome DevTools Protocol (CDP) - external via socat
    environment:
      - LANG=zh_TW.UTF-8
      - LC_ALL=zh_TW.UTF-8
      - LANGUAGE=zh_TW:zh
    # 如果需要存取本機檔案，可以掛載
    # volumes:
    #   - ./downloads:/home/user/Downloads
    # Chromium 需要一些特殊權限
    shm_size: '2gb'
    security_opt:
      - seccomp:unconfined
    restart: unless-stopped
